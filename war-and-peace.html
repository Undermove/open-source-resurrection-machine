<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Война и мир — доска расследования</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Neucha&display=swap" rel="stylesheet">
<style>
  :root {
    --board-bg: #fdfdf8;
    --board-grid: rgba(90, 120, 160, 0.10);
    --ink: #2b2b33;
    --ink-soft: #55555f;
    --marker-red: #c93a3a;
    --marker-blue: #2f6fba;
    --marker-green: #3a8f5d;
    --marker-orange: #d07b2c;
    --sticky: #fff5a8;
    --sticky-shadow: rgba(120, 100, 20, 0.25);
    --card-paper: #ffffff;
    --card-border: #2b2b33;
    --locked-paper: #ecece4;
    --pin: #d23b3b;
    --modal-bg: rgba(30, 30, 40, 0.45);
    --tray-bg: rgba(253, 253, 248, 0.92);
  }
  [data-theme="dark"] {
    --board-bg: #22312b;
    --board-grid: rgba(255, 255, 255, 0.05);
    --ink: #f0ead8;
    --ink-soft: #c9c2ad;
    --marker-red: #ff8f7e;
    --marker-blue: #8ec1ff;
    --marker-green: #93d9ae;
    --marker-orange: #ffc177;
    --sticky: #4a4632;
    --sticky-shadow: rgba(0, 0, 0, 0.5);
    --card-paper: #2d3d36;
    --card-border: #f0ead8;
    --locked-paper: #283530;
    --pin: #ff6f5e;
    --modal-bg: rgba(0, 0, 0, 0.6);
    --tray-bg: rgba(34, 49, 43, 0.92);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overscroll-behavior: none; }

  body {
    font-family: 'Neucha', 'Comic Sans MS', cursive;
    color: var(--ink);
    background: var(--board-bg);
    overflow: hidden;
  }

  /* ── Top bar ─────────────────────────────── */
  .topbar {
    position: fixed; inset: 0 0 auto 0; z-index: 40;
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.5rem 0.9rem;
    background: var(--tray-bg);
    backdrop-filter: blur(6px);
    border-bottom: 2px solid var(--ink);
  }
  .topbar h1 {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.25rem, 4vw, 1.8rem);
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .topbar .progress {
    font-size: 0.85rem; color: var(--ink-soft); white-space: nowrap;
  }
  .topbar .spacer { flex: 1; }
  .tool-btn {
    font-family: 'Neucha', cursive;
    font-size: 1rem;
    color: var(--ink);
    background: var(--card-paper);
    border: 2px solid var(--ink);
    border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
    padding: 0.15rem 0.65rem;
    cursor: pointer;
    transition: transform 0.12s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .tool-btn:hover { transform: scale(1.06) rotate(-1deg); }
  .tool-btn:active { transform: scale(0.95); }
  .tool-btn:focus-visible { outline: 3px dashed var(--marker-blue); outline-offset: 2px; }

  /* ── Board viewport ──────────────────────── */
  .viewport {
    position: fixed; inset: 0;
    top: var(--topbar-h, 52px); /* уточняется из JS по факту */
    overflow: auto;
    cursor: grab;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x pan-y; /* pinch обрабатываем сами */
  }
  .viewport.dragging { cursor: grabbing; }
  .zoomwrap { transform-origin: 0 0; }
  .board {
    position: relative;
    width: 3400px; height: 2560px;
    background:
      linear-gradient(var(--board-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--board-grid) 1px, transparent 1px),
      var(--board-bg);
    background-size: 40px 40px, 40px 40px, auto;
  }

  svg.strings {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Cluster labels ──────────────────────── */
  .cluster-label {
    position: absolute; z-index: 2;
    font-family: 'Caveat', cursive;
    font-size: 2.2rem; font-weight: 700;
    letter-spacing: 0.04em;
    transform: rotate(-2deg);
    border-bottom: 4px solid var(--marker-blue);
    padding: 0 0.4rem 0.1rem;
    pointer-events: none;
  }
  .cluster-label.small { font-size: 1.5rem; border-bottom-width: 3px; }

  /* ── Character cards ─────────────────────── */
  .char {
    position: absolute; z-index: 3;
    width: 156px;
    background: var(--card-paper);
    border: 2.5px solid var(--card-border);
    border-radius: 12px 255px 15px 225px / 225px 15px 255px 12px;
    padding: 10px 8px 8px;
    text-align: center;
    cursor: pointer;
    box-shadow: 3px 4px 0 var(--sticky-shadow);
    transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
  }
  .char:hover { transform: scale(1.05) rotate(1deg); z-index: 6; }
  .char:focus-visible { outline: 3px dashed var(--marker-blue); outline-offset: 3px; }
  .char::before { /* канцелярская кнопка */
    content: "";
    position: absolute; top: -9px; left: 50%;
    width: 14px; height: 14px; margin-left: -7px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff8f80, var(--pin) 65%);
    box-shadow: 0 2px 3px rgba(0,0,0,0.35);
  }
  .char .avatar { width: 92px; height: 92px; margin: 0 auto; }
  .char .avatar svg { width: 100%; height: 100%; }
  .char .name {
    font-size: 1.02rem; line-height: 1.1; margin-top: 4px;
  }
  .char .hint { font-size: 0.72rem; color: var(--ink-soft); line-height: 1.15; }
  .char.spotlit { transform: scale(1.1); z-index: 7; box-shadow: 0 0 0 4px var(--marker-orange), 3px 4px 0 var(--sticky-shadow); }
  .char.dimmed { opacity: 0.25; }
  .char.pop-in { animation: pop 0.45s cubic-bezier(0.3, 1.4, 0.5, 1); }
  @keyframes pop { from { transform: scale(0.2) rotate(-8deg); opacity: 0; } }
  .char.hidden-char {
    border-style: dashed;
    opacity: 0.62;
    cursor: default;
    background: var(--locked-paper);
  }
  .char.hidden-char::before { background: radial-gradient(circle at 35% 30%, #cfcfcf, #8f8f8f 65%); }
  .char.hidden-char:hover { transform: none; }
  .char.hidden-char .name { color: var(--ink-soft); }

  /* ── Story cards (стикеры) ───────────────── */
  .story {
    position: absolute; z-index: 3;
    width: 400px; min-height: 200px;
    background: var(--sticky);
    padding: 14px 16px 12px;
    box-shadow: 4px 6px 8px var(--sticky-shadow);
    cursor: pointer;
    transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 2px;
  }
  .story:nth-child(odd) { transform: rotate(-1.2deg); }
  .story:nth-child(even) { transform: rotate(1deg); }
  .story:hover { transform: rotate(0deg) scale(1.04); z-index: 6; }
  .story:focus-visible { outline: 3px dashed var(--marker-blue); outline-offset: 3px; }
  .story::before {
    content: "";
    position: absolute; top: -10px; left: 24px;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #9fc7ff, var(--marker-blue) 65%);
    box-shadow: 0 2px 3px rgba(0,0,0,0.35);
  }
  .story .step {
    position: absolute; top: -16px; right: -14px;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat', cursive; font-size: 1.5rem; font-weight: 700;
    color: var(--marker-red);
    border: 3px solid var(--marker-red);
    border-radius: 50% 45% 55% 48% / 48% 55% 45% 52%;
    background: var(--card-paper);
    transform: rotate(6deg);
  }
  .story .where {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--ink-soft);
  }
  .story h3 {
    font-family: 'Caveat', cursive;
    font-size: 1.7rem; font-weight: 700; line-height: 1.05;
    margin: 2px 0 6px;
  }
  .story .teaser { font-size: 0.98rem; line-height: 1.3; }
  .story .more {
    margin-top: 8px; font-size: 0.85rem; color: var(--marker-blue);
  }
  .story.locked {
    background: var(--locked-paper);
    color: var(--ink-soft);
    box-shadow: 2px 3px 5px var(--sticky-shadow);
  }
  .story.locked h3 { color: var(--ink-soft); font-size: 1.45rem; }
  .story.locked .lockface {
    display: flex; align-items: center; gap: 10px;
    font-size: 2rem; margin-top: 10px;
  }
  .story.locked .lockface span { font-size: 0.92rem; line-height: 1.25; }
  .story.frontier { outline: 4px dashed var(--marker-red); outline-offset: 5px; }
  .story .listen-here {
    position: absolute; bottom: -18px; right: 10px;
    font-family: 'Caveat', cursive; font-size: 1.25rem; font-weight: 700;
    color: var(--marker-red);
    transform: rotate(-3deg);
  }
  .unlock-btn {
    margin-top: 10px;
    font-family: 'Caveat', cursive; font-size: 1.25rem; font-weight: 700;
    color: var(--board-bg);
    background: var(--marker-red);
    border: none; border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
    padding: 0.25rem 0.9rem;
    cursor: pointer;
    transition: transform 0.12s;
  }
  .unlock-btn:hover { transform: scale(1.06); }

  /* ── Legend ──────────────────────────────── */
  .legend {
    position: fixed; left: 0.9rem; bottom: 0.9rem; z-index: 40;
    background: var(--tray-bg);
    backdrop-filter: blur(6px);
    border: 2px solid var(--ink);
    border-radius: 15px 225px 15px 255px / 255px 15px 225px 15px;
    padding: 0.5rem 0.9rem;
    font-size: 0.85rem;
    display: grid; gap: 0.15rem;
  }
  .legend .row { display: flex; align-items: center; gap: 0.5rem; }
  .legend .swatch { width: 34px; height: 0; border-top: 3px solid; border-radius: 2px; }
  .legend .swatch.dash { border-top-style: dashed; }
  .legend .fam { border-color: var(--marker-green); }
  .legend .lov { border-color: var(--marker-red); }
  .legend .fri { border-color: var(--marker-blue); }
  .legend .intr { border-color: var(--marker-orange); }
  .legend.collapsed .row { display: none; }
  .legend .legend-title { font-family: 'Caveat', cursive; font-weight: 700; font-size: 1.1rem; cursor: pointer; }

  .zoombar {
    position: fixed; right: 0.9rem; bottom: 0.9rem; z-index: 40;
    display: flex; flex-direction: column; gap: 0.4rem;
  }
  .zoombar .tool-btn { font-size: 1.2rem; width: 2.4rem; }

  /* ── Modals ──────────────────────────────── */
  .modal-veil {
    position: fixed; inset: 0; z-index: 50;
    background: var(--modal-bg);
    display: none;
    align-items: flex-start; justify-content: center;
    overflow-y: auto;
    padding: 4.5rem 1rem 2rem;
  }
  .modal-veil.open { display: flex; }
  .modal {
    background: var(--card-paper);
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 12px 255px 15px 225px / 125px 15px 255px 12px;
    width: min(680px, 100%);
    padding: 1.5rem 1.6rem 1.4rem;
    position: relative;
    box-shadow: 6px 8px 0 var(--sticky-shadow);
    animation: modal-in 0.25s cubic-bezier(0.3, 1.3, 0.5, 1);
  }
  @keyframes modal-in { from { transform: translateY(20px) scale(0.95); opacity: 0; } }
  .modal .close {
    position: absolute; top: 0.5rem; right: 0.8rem;
    font-family: 'Caveat', cursive; font-size: 1.8rem; font-weight: 700;
    background: none; border: none; color: var(--marker-red); cursor: pointer;
  }
  .modal .where { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-soft); }
  .modal h2 { font-family: 'Caveat', cursive; font-size: 2.2rem; font-weight: 700; line-height: 1.05; margin: 0.1rem 0 0.7rem; }
  .modal ul { list-style: none; display: grid; gap: 0.55rem; margin-bottom: 0.9rem; }
  .modal ul li { padding-left: 1.4rem; position: relative; line-height: 1.35; }
  .modal ul li::before { content: "✦"; position: absolute; left: 0.1rem; color: var(--marker-red); }
  .modal .section-label {
    font-family: 'Caveat', cursive; font-size: 1.35rem; font-weight: 700;
    border-bottom: 3px solid var(--marker-blue); display: inline-block; margin-bottom: 0.5rem;
  }
  .cast-chips { display: flex; flex-wrap: wrap; gap: 0.45rem; }
  .chip {
    font-family: 'Neucha', cursive; font-size: 0.92rem;
    color: var(--ink);
    border: 2px solid var(--ink);
    background: var(--board-bg);
    border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
    padding: 0.1rem 0.6rem;
    cursor: pointer;
  }
  .chip.new { border-color: var(--marker-red); color: var(--marker-red); }
  .chip.new::after { content: " ★"; }
  .modal .char-head { display: flex; gap: 1rem; align-items: center; margin-bottom: 0.8rem; }
  .modal .char-head .avatar { width: 110px; height: 110px; flex: none; }
  .modal .char-head .avatar svg { width: 100%; height: 100%; }
  .modal .bio { line-height: 1.4; margin-bottom: 0.9rem; }
  .motive { border-left: 4px solid var(--marker-orange); padding: 0.15rem 0 0.15rem 0.8rem; margin-bottom: 0.6rem; }
  .motive .at { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft); }
  .motive.latest { border-left-color: var(--marker-red); background: color-mix(in srgb, var(--marker-red) 8%, transparent); }
  .modal .foot-note { font-size: 0.85rem; color: var(--ink-soft); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
  @media (max-width: 640px) {
    .topbar .progress { display: none; }
    .legend { font-size: 0.75rem; }
  }
</style>
</head>
<body>

<header class="topbar">
  <h1>«Война и мир» · доска расследования</h1>
  <span class="progress" id="progressLabel"></span>
  <span class="spacer"></span>
  <button class="tool-btn" id="helpBtn" title="Как пользоваться">?</button>
  <button class="tool-btn" id="themeBtn" title="Тема">🌙</button>
  <button class="tool-btn" id="resetBtn" title="Сбросить прогресс">↺</button>
</header>

<div class="viewport" id="viewport">
  <div class="zoomwrap" id="zoomwrap">
    <div class="board" id="board">
      <svg class="strings" id="strings" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="wobble">
            <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
          </filter>
          <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="context-stroke" stroke-width="2" stroke-linecap="round"/>
          </marker>
        </defs>
        <g id="routeLayer"></g>
        <g id="relLayer"></g>
        <g id="castLayer"></g>
      </svg>
      <!-- cards are rendered by JS -->
    </div>
  </div>
</div>

<aside class="legend" id="legend">
  <div class="legend-title" id="legendTitle">Ниточки ▾</div>
  <div class="row"><span class="swatch fam"></span> семья</div>
  <div class="row"><span class="swatch lov"></span> любовь</div>
  <div class="row"><span class="swatch fri"></span> дружба</div>
  <div class="row"><span class="swatch intr dash"></span> интриги и вражда</div>
</aside>

<div class="zoombar">
  <button class="tool-btn" id="zoomIn" title="Приблизить">+</button>
  <button class="tool-btn" id="zoomOut" title="Отдалить">−</button>
</div>

<div class="modal-veil" id="veil">
  <div class="modal" id="modalBox" role="dialog" aria-modal="true"></div>
</div>

<script>
"use strict";

/* ═════════════ ДАННЫЕ ═════════════ */

/* Портреты-дудлы: параметры для генератора */
const CHARACTERS = {
  sherer:   { name: "Анна Павловна Шерер", group: "Свет", intro: "n1",
    doodle: { face: "oval", hair: "curly", mouth: "smile", extras: ["fan"] },
    bio: "Хозяйка петербургского салона, фрейлина. ≈40 лет. Её вечер — «прядильная мастерская»: рассаживает гостей по кружкам и следит за беседой.",
    motives: [ { node: "n1", text: "Чтобы вечер удался: подать виконта гостям, как повар подаёт редкое блюдо." } ] },

  vasily:   { name: "Князь Василий Курагин", group: "Курагины", intro: "n1",
    doodle: { face: "round", hair: "bald", mouth: "flat", extras: ["star"] },
    bio: "Тот самый «лысый мужик» с блестящей лысиной и звёздами. ≈55–60. Важный сановник, говорит лениво, как актёр старой пьесы. Холоден и расчётлив.",
    motives: [
      { node: "n1", text: "Пристроить детей: Анатоля — выгодно женить, Ипполита — по службе." },
      { node: "n4", text: "Урвать наследство умирающего графа Безухова — он тоже родня." },
      { node: "n5", text: "Портфель уплыл. Мгновенно меняет тактику: теперь надо дружить с Пьером." },
      { node: "n9", text: "План сработал: Пьер женат на Элен, деньги Безуховых — в семье." },
      { node: "n10", text: "Теперь Анатоля — на богатой княжне Марье. Не вышло." } ] },

  helen:    { name: "Элен Курагина", group: "Курагины", intro: "n1",
    doodle: { face: "oval", hair: "updo", mouth: "smile", extras: ["pearls"] },
    bio: "Ослепительная красавица: мраморные плечи и неизменная спокойная улыбка. ≈20. Красивая, холодная, пустая.",
    motives: [
      { node: "n1", text: "Красота — её капитал. Улыбаться и ждать выгодной партии." },
      { node: "n9", text: "Стала графиней Безуховой — богатейшей женщиной Петербурга." },
      { node: "n12", text: "После дуэли свет — на её стороне: она держит блестящий салон, Пьер «чудак»." },
      { node: "n16", text: "Помогает брату Анатолю подобраться к Наташе." },
      { node: "n19", text: "Задумала развод при живом муже: выбирает между вельможей и принцем." } ] },

  anatole:  { name: "Анатоль Курагин", group: "Курагины", intro: "n1",
    doodle: { face: "oval", hair: "wavy", mouth: "smirk", extras: [] },
    bio: "Красавец и кутила, дорого обходится отцу. ≈20–22. Живёт как «благородное животное»: ни секунды сомнений в себе.",
    motives: [
      { node: "n1", text: "Его самого в салоне нет — но отец уже ищет, на ком бы его выгодно женить." },
      { node: "n2", text: "Кутить. Ром, медведь, актрисы — остальное неважно." },
      { node: "n10", text: "Отец повёз женить на богатой княжне. Ему всё равно на ком — кокетничает с компаньонкой." },
      { node: "n16", text: "Увезти Наташу — просто потому что хочется. То, что он уже тайно женат, его не смущает." },
      { node: "n18", text: "На перевязочном пункте Бородина. Потерял ногу — и получил прощение Андрея." } ] },

  ippolit:  { name: "Ипполит Курагин", group: "Курагины", intro: "n1",
    doodle: { face: "oval", hair: "wavy", mouth: "o", extras: ["monocle"] },
    bio: "Старший сын. Лицом похож на красавицу-сестру, но «лицо затуманено идиотизмом». ≈24–25.",
    motives: [ { node: "n1", text: "Рассказывать несмешные анекдоты и волочиться за маленькой княгиней." } ] },

  pierre:   { name: "Пьер Безухов", group: "Безуховы", intro: "n1",
    doodle: { face: "round", hair: "short", mouth: "smile", extras: ["glasses"] },
    bio: "Массивный, толстый, в очках. ≈20. Незаконный сын графа Безухова, только из-за границы. Умный, робкий, естественный — сразу видно: не светский.",
    motives: [
      { node: "n1", text: "Найти своё место. Пока — спорить о Наполеоне и делать всё невпопад." },
      { node: "n5", text: "Внезапно — граф и богатейший наследник России. Совершенно к этому не готов." },

      case "bow": p.push(`<path d="M ${cx+16} ${hy+4} l 9 -7 l 0 12 Z M ${cx+16} ${hy+4} l -9 -7 l 0 12 Z" fill="var(--marker-red)"/>`); break;
      case "pearls": p.push(...[-10,-5,0,5,10].map(o => `<circle cx="${cx+o}" cy="${cy+faceH+7}" r="2.6" fill="none" stroke="${ink}" stroke-width="1.6"/>`)); break;
      case "fan": p.push(`<path d="M 84 78 l -12 -14 M 84 78 l -16 -8 M 84 78 l -17 -1 M 68 62 a 22 22 0 0 1 -1 15" stroke="${ink}" stroke-width="2" fill="none"/>`); break;
      case "star": p.push(`<path d="M ${cx-2} 93 l 2 -6 l 2 6 l -6 -4 l 8 0 Z" fill="none" stroke="${ink}" stroke-width="1.6"/>`); break;
      case "epaulettes": p.push(`<path d="M 12 96 l 14 -6 m -14 9 l 14 -4 M 88 96 l -14 -6 m 14 9 l -14 -4" stroke="var(--marker-orange)" stroke-width="2.6"/>`); break;
      case "bicorne": p.push(`<path d="M ${cx-faceW-8} ${hy+6} Q ${cx} ${hy-22} ${cx+faceW+8} ${hy+6} Q ${cx} ${hy+2} ${cx-faceW-8} ${hy+6} Z" fill="${ink}" opacity="0.9"/>`); break;
      case "handvest": p.push(`<path d="M ${cx-4} 92 q 8 -6 12 2" stroke="${ink}" stroke-width="2.4" fill="none"/>`); break;
      case "pipe": p.push(`<path d="M ${cx+8} ${my+1} l 12 5 m 0 0 l 0 4 l 6 0 l 0 -6 l -6 0" stroke="${ink}" stroke-width="2" fill="none"/>`); break;
      case "freckles": p.push(...[-6,0,6].map(o => `<circle cx="${cx+o}" cy="${cy+5}" r="1.1" fill="${ink}"/>`)); break;
      case "lipfuzz": p.push(`<path d="M ${cx-5} ${my-5} l 10 0" stroke="${ink}" stroke-width="1.4" opacity="0.6"/>`); break;
      case "cross": p.push(`<path d="M ${cx} 90 l 0 8 m -4 -5 l 8 0" stroke="${ink}" stroke-width="1.8"/>`); break;
    }
  }
  return `<svg viewBox="0 0 ${S} ${S+8}" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">${p.join("")}</svg>`;
}

/* ═════════════ СОСТОЯНИЕ ═════════════ */
const LS_KEY = "wnp-board-progress";
const LS_THEME = "wnp-board-theme";
const INITIAL_UNLOCKED = 5; // прослушано до «Мозаикового портфеля»
let unlocked = (() => {
  const v = parseInt(localStorage.getItem(LS_KEY), 10);
  return Number.isFinite(v) ? Math.min(Math.max(v, 1), NODES.length) : INITIAL_UNLOCKED;
})();
let zoom = window.innerWidth < 700 ? 0.42 : 0.8;

const board = document.getElementById("board");
const zoomwrap = document.getElementById("zoomwrap");
const viewport = document.getElementById("viewport");
const relLayer = document.getElementById("relLayer");
const routeLayer = document.getElementById("routeLayer");
const castLayer = document.getElementById("castLayer");
const veil = document.getElementById("veil");
const modalBox = document.getElementById("modalBox");

const nodeIndex = Object.fromEntries(NODES.map((n, i) => [n.id, i]));
const isNodeOpen = id => nodeIndex[id] < unlocked;
const isCharVisible = id => isNodeOpen(CHARACTERS[id].intro);

const COLORS = { fam: "var(--marker-green)", lov: "var(--marker-red)", fri: "var(--marker-blue)", intr: "var(--marker-orange)" };

/* ═════════════ РЕНДЕР ═════════════ */
function charCenter(id) { const [x, y] = CHAR_POS[id]; return [x + CHAR_W / 2, y + CHAR_H / 2]; }
function storyCenter(i) { const [x, y] = storyPos(i); return [x + STORY_W / 2, y + STORY_H / 2]; }

function sagPath(x1, y1, x2, y2, sag) {
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2 + (sag || 40);
  return `M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`;
}

function render() {
  // снять старые карточки
  board.querySelectorAll(".char, .story, .cluster-label").forEach(el => el.remove());

  for (const c of CLUSTERS) {
    const el = document.createElement("div");
    el.className = "cluster-label" + (c.small ? " small" : "");
    el.style.left = c.x + "px"; el.style.top = c.y + "px";
    el.textContent = c.label;
    board.appendChild(el);
  }

  for (const [id, ch] of Object.entries(CHARACTERS)) {
    const [x, y] = CHAR_POS[id];
    const el = document.createElement("button");
    el.dataset.char = id;
    el.style.left = x + "px"; el.style.top = y + "px";
    if (isCharVisible(id)) {
      el.className = "char";
      const latest = [...ch.motives].reverse().find(m => isNodeOpen(m.node));
      el.innerHTML = `<div class="avatar">${doodleSVG(ch.doodle, id.length * 7 + id.charCodeAt(0))}</div>
        <div class="name">${ch.name}</div>
        <div class="hint">${latest ? "→ " + latest.text.slice(0, 46) + (latest.text.length > 46 ? "…" : "") : ""}</div>`;
      el.addEventListener("click", () => openChar(id));
    } else {
      // силуэт: имя не раскрываем, но говорим, где персонаж появится
      const iIdx = nodeIndex[ch.intro];
      el.className = "char hidden-char";
      el.setAttribute("aria-label", "Скрытый персонаж, откроется в эпизоде " + (iIdx + 1));
      el.innerHTML = `<div class="avatar"><svg viewBox="0 0 100 108" aria-hidden="true">
          <ellipse cx="50" cy="52" rx="30" ry="37" fill="var(--ink)" opacity="0.14"
            stroke="var(--ink-soft)" stroke-width="2.4" stroke-dasharray="7 6"/>
          <text x="50" y="66" text-anchor="middle" font-family="Caveat, cursive" font-size="46"
            font-weight="700" fill="var(--ink-soft)">?</text></svg></div>
        <div class="name">???</div>
        <div class="hint">откроется в эп. ${iIdx + 1}<br>${NODES[iIdx].part.replace(/ · гл.*$/, "")}</div>`;
    }
    board.appendChild(el);
  }

  NODES.forEach((n, i) => {
    const [x, y] = storyPos(i);
    const el = document.createElement("div");
    el.className = "story";
    el.dataset.node = n.id;
    el.style.left = x + "px"; el.style.top = y + "px";
    el.tabIndex = 0; el.setAttribute("role", "button");
    if (i < unlocked) {
      el.innerHTML = `<div class="step">${i + 1}</div>
        <div class="where">${n.part}</div><h3>${n.title}</h3>
        <div class="teaser">${n.teaser}</div>
        <div class="more">открыть конспект →</div>`;
      if (i === unlocked - 1) {
        el.classList.add("frontier");
        el.innerHTML += `<div class="listen-here">🎧 ты здесь</div>`;
      }
      el.addEventListener("click", () => openStory(n.id));
      el.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openStory(n.id); } });
    } else {
      el.classList.add("locked");
      el.innerHTML = `<div class="step">${i + 1}</div>
        <div class="where">${n.part}</div><h3>Ещё не прослушано</h3>
        <div class="lockface">🔒 <span>Конспект и персонажи откроются,<br>когда дослушаешь досюда.</span></div>`;
      if (i === unlocked) {
        const btn = document.createElement("button");
        btn.className = "unlock-btn";
        btn.textContent = "Прослушал — открыть ✓";
        btn.addEventListener("click", e => { e.stopPropagation(); unlockNext(); });
        el.appendChild(btn);
      }
    }
    board.appendChild(el);
  });

  drawStrings();
  updateProgress();
}

function drawStrings() {
  relLayer.innerHTML = ""; routeLayer.innerHTML = "";
  // маршрут между стикерами
  for (let i = 0; i < NODES.length - 1; i++) {
    const [x1, y1] = storyCenter(i), [x2, y2] = storyCenter(i + 1);
    const open = i + 1 < unlocked;
    routeLayer.innerHTML += `<path d="${sagPath(x1, y1 + 60, x2, y2 - 60, 20)}" fill="none"
      stroke="${open ? "var(--ink)" : "var(--ink-soft)"}" stroke-width="${open ? 3 : 2}"
      stroke-dasharray="${open ? "none" : "6 9"}" opacity="${open ? 0.55 : 0.25}"
      marker-end="url(#arrow)" filter="url(#wobble)"/>`;
  }
  // ниточки-отношения
  const seen = new Set();
  for (const n of NODES) {
    if (!isNodeOpen(n.id)) continue;
    for (const [a, b, type, label] of (n.rels || [])) {
      const key = a + "|" + b + "|" + type;
      if (seen.has(key) || !isCharVisible(a) || !isCharVisible(b)) continue;
      seen.add(key);
      const [x1, y1] = charCenter(a), [x2, y2] = charCenter(b);
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const sag = Math.min(80, 14 + dist * 0.07);
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2 + sag;
      relLayer.innerHTML += `<path d="${sagPath(x1, y1, x2, y2, sag)}" fill="none"
        stroke="${COLORS[type]}" stroke-width="2.6" ${type === "intr" ? 'stroke-dasharray="8 7"' : ""}
        opacity="0.8" filter="url(#wobble)"/>
        <text x="${mx}" y="${my - 4}" text-anchor="middle" font-family="Caveat, cursive" font-size="19"
          fill="${COLORS[type]}" paint-order="stroke" stroke="var(--board-bg)" stroke-width="5">${label}</text>`;
    }
  }
}

function spotlight(nodeId) {
  castLayer.innerHTML = "";
  document.querySelectorAll(".char").forEach(el => el.classList.remove("spotlit", "dimmed"));
  if (!nodeId) return;
  const n = NODES[nodeIndex[nodeId]];
  const cast = new Set(n.cast.filter(isCharVisible));
  const [sx, sy] = storyCenter(nodeIndex[nodeId]);
  document.querySelectorAll(".char").forEach(el => {
    el.classList.add(cast.has(el.dataset.char) ? "spotlit" : "dimmed");
  });
  for (const id of cast) {
    const [cx2, cy2] = charCenter(id);
    castLayer.innerHTML += `<path d="${sagPath(sx, sy - 80, cx2, cy2 + 70, 30)}" fill="none"
      stroke="var(--marker-orange)" stroke-width="2" stroke-dasharray="3 6" opacity="0.65" filter="url(#wobble)"/>`;
  }
}

/* ═════════════ МОДАЛКИ ═════════════ */
function openStory(id) {
  const n = NODES[nodeIndex[id]];
  spotlight(id);
  const newChars = new Set(Object.keys(CHARACTERS).filter(c => CHARACTERS[c].intro === id));
  modalBox.innerHTML = `
    <button class="close" aria-label="Закрыть">✕ </button>
    <div class="where">${n.part}</div>
    <h2>${nodeIndex[id] + 1}. ${n.title}</h2>
    <ul>${n.bullets.map(b => `<li>${b}</li>`).join("")}</ul>
    <div class="section-label">Действующие лица</div>
    <div class="cast-chips">${n.cast.filter(isCharVisible).map(c =>
      `<button class="chip${newChars.has(c) ? " new" : ""}" data-char="${c}">${CHARACTERS[c].name}</button>`).join("")}</div>
    <p class="foot-note" style="margin-top:0.8rem">★ — персонаж впервые появляется здесь. Нажми на имя — откроется досье.</p>`;
  openVeil();
}

function openChar(id) {
  const ch = CHARACTERS[id];
  const motives = ch.motives.filter(m => isNodeOpen(m.node));
  modalBox.innerHTML = `
    <button class="close" aria-label="Закрыть">✕</button>
    <div class="char-head">
      <div class="avatar">${doodleSVG(ch.doodle, id.length * 7 + id.charCodeAt(0))}</div>
      <div><div class="where">${ch.group}</div><h2 style="margin:0">${ch.name}</h2></div>
    </div>
    <p class="bio">${ch.bio}</p>
    <div class="section-label">Мотивация по ходу книги</div>
    ${motives.map((m, i) => `<div class="motive${i === motives.length - 1 ? " latest" : ""}">
      <div class="at">${NODES[nodeIndex[m.node]].title}</div>${m.text}</div>`).join("") || "<p class='foot-note'>Пока загадка…</p>"}
    ${motives.length < ch.motives.length ? `<p class="foot-note">…дальше будет ещё ${ch.motives.length - motives.length} — дослушай и открой.</p>` : ""}`;
  openVeil();
}

function openHelp() {
  modalBox.innerHTML = `
    <button class="close" aria-label="Закрыть">✕</button>
    <h2>Как пользоваться доской</h2>
    <ul>
      <li>Доска двигается: тяни мышкой или пальцем, кнопки + / − — масштаб.</li>
      <li>Жёлтые стикеры внизу — сюжет по порядку. Открытые можно читать, на 🔒 спойлеров нет.</li>
      <li>Дослушал до закрытого стикера — жми «Прослушал — открыть ✓»: появятся конспект, новые персонажи и ниточки.</li>
      <li>Карточки с портретами — досье персонажей: кто такой, приметы и как меняется его мотивация.</li>
      <li>Клик по стикеру подсвечивает его участников на доске.</li>
      <li>Прогресс хранится в этом браузере (localStorage). ↺ — сбросить к началу.</li>
    </ul>
    <p class="foot-note">Сейчас открыто ${unlocked} из ${NODES.length} эпизодов — до «${NODES[unlocked - 1].title}».</p>`;
  openVeil();
}

function openVeil() { veil.classList.add("open"); }
function closeVeil() { veil.classList.remove("open"); spotlight(null); }

veil.addEventListener("click", e => {
  if (e.target === veil || e.target.closest(".close")) closeVeil();
  const chip = e.target.closest(".chip");
  if (chip) openChar(chip.dataset.char);
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeVeil(); });

/* ═════════════ ПРОГРЕСС ═════════════ */
function updateProgress() {
  document.getElementById("progressLabel").textContent =
    `открыто ${unlocked} / ${NODES.length} · ${NODES[unlocked - 1].part.replace(/ · гл.*$/, "")}`;
}

function unlockNext() {
  if (unlocked >= NODES.length) return;
  unlocked++;
  localStorage.setItem(LS_KEY, unlocked);
  render();
  const n = NODES[unlocked - 1];
  const fresh = Object.keys(CHARACTERS).filter(c => CHARACTERS[c].intro === n.id);
  document.querySelectorAll(".char").forEach(el => {
    if (fresh.includes(el.dataset.char)) el.classList.add("pop-in");
  });
  openStory(n.id);
}

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Сбросить прогресс до самого начала (эпизод 1)?")) {
    unlocked = 1; localStorage.setItem(LS_KEY, 1); render(); scrollToFrontier();
  }
});
document.getElementById("helpBtn").addEventListener("click", openHelp);

/* ═════════════ ТЕМА ═════════════ */
const themeBtn = document.getElementById("themeBtn");
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === "dark" ? "☀️" : "🌙";
  drawStrings();
}
applyTheme(localStorage.getItem(LS_THEME) ||
  (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
themeBtn.addEventListener("click", () => {
  const t = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  localStorage.setItem(LS_THEME, t); applyTheme(t);
});

/* ═════════════ ЗУМ И ПАН ═════════════ */
const ZOOM_MIN = 0.18, ZOOM_MAX = 1.6;
function applyZoom() {
  zoomwrap.style.transform = `scale(${zoom})`;
  zoomwrap.style.width = 3400 * zoom + "px";
  zoomwrap.style.height = 2560 * zoom + "px";
}
/* зум к точке (cx, cy — клиентские координаты); без точки — к центру вьюпорта */
function setZoom(newZoom, cx, cy) {
  const rect = viewport.getBoundingClientRect();
  if (cx === undefined) { cx = rect.left + rect.width / 2; cy = rect.top + rect.height / 2; }
  const px = (viewport.scrollLeft + cx - rect.left) / zoom;
  const py = (viewport.scrollTop + cy - rect.top) / zoom;
  zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newZoom));
  applyZoom();
  viewport.scrollLeft = px * zoom - (cx - rect.left);
  viewport.scrollTop = py * zoom - (cy - rect.top);
}
document.getElementById("zoomIn").addEventListener("click", () => setZoom(zoom * 1.2));
document.getElementById("zoomOut").addEventListener("click", () => setZoom(zoom / 1.2));

/* пинч на тачпаде мака: браузер шлёт wheel с ctrlKey=true */
viewport.addEventListener("wheel", e => {
  if (!e.ctrlKey) return; // обычная прокрутка — нативная
  e.preventDefault();
  setZoom(zoom * Math.exp(-e.deltaY * 0.012), e.clientX, e.clientY);
}, { passive: false });

/* Safari шлёт gesture-события вместо ctrl+wheel */
let gestureStartZoom = null;
viewport.addEventListener("gesturestart", e => { e.preventDefault(); gestureStartZoom = zoom; });
viewport.addEventListener("gesturechange", e => {
  e.preventDefault();
  if (gestureStartZoom) setZoom(gestureStartZoom * e.scale, e.clientX, e.clientY);
});
viewport.addEventListener("gestureend", e => { e.preventDefault(); gestureStartZoom = null; });

let drag = null;
viewport.addEventListener("mousedown", e => {
  if (e.target.closest(".char, .story, button")) return;
  drag = { x: e.clientX, y: e.clientY, sl: viewport.scrollLeft, st: viewport.scrollTop };
  viewport.classList.add("dragging");
});
window.addEventListener("mousemove", e => {
  if (!drag) return;
  viewport.scrollLeft = drag.sl - (e.clientX - drag.x);
  viewport.scrollTop = drag.st - (e.clientY - drag.y);
});
window.addEventListener("mouseup", () => { drag = null; viewport.classList.remove("dragging"); });

document.getElementById("legendTitle").addEventListener("click", () =>
  document.getElementById("legend").classList.toggle("collapsed"));
if (window.innerWidth < 700) document.getElementById("legend").classList.add("collapsed");

function scrollToFrontier() {
  const [x, y] = storyCenter(unlocked - 1);
  viewport.scrollLeft = x * zoom - viewport.clientWidth / 2;
  viewport.scrollTop = y * zoom - viewport.clientHeight / 2;
}

/* ═════════════ СТАРТ ═════════════ */
function syncTopbar() {
  document.documentElement.style.setProperty("--topbar-h",
    document.querySelector(".topbar").offsetHeight + "px");
}
syncTopbar();
window.addEventListener("resize", syncTopbar);
applyZoom();
render();
scrollToFrontier();
</script>
</body>
</html>
